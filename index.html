<!DOCTYPE html>
<html lang="en">

        :root { --kali-blue: #007bff; --kali-dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #2e2e2e; color: #e0e0e0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #3c3c3c; padding: 25px; border-radius: 10px; border: 1px solid #555; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--kali-blue); border-bottom: 2px solid #555; padding-bottom: 10px; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #bbb; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--kali-blue); outline: none; background: #2a2a2a; box-shadow: 0 0 5px var(--kali-blue); }
        .permanent-info { background: #444 !important; color: #00ff00; font-weight: bold; text-align: center; }
        .btn-row { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; min-width: 150px; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .gps-btn { background: #6f42c1; color: white; }
        .add-btn { background: #28a745; color: white; }
        .excel-btn { background: #fd7e14; color: white; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; background: #222; font-size: 0.8em; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        th { background: #111; color: var(--kali-blue); }
        .autofill-hint { color: #00ff00; font-size: 0.75em; margin-top: 4px; display: none; font-style: italic; }
        .counter-badge { background: #555; color: #00ff00; padding: 5px 15px; border-radius: 5px; float: right; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="counter-badge">Records: <span id="recordCount">0</span></div>
    <h2>⚡ YEDC DATA ENUMERATION (DT: DS 0097)</h2>
    
    <div class="grid">
        <div class="form-group">
            <label>S/N</label>
            <input type="number" id="sn" value="1">
        </div>
        <div class="form-group">
            <label>DT Code (Fixed)</label>
            <input type="text" id="dtCode" value="DS 0097" class="permanent-info" readonly>
        </div>
        <div class="form-group">
            <label>Account Number (Type to Autofill)</label>
            <input type="text" id="accNum" oninput="handleAutofill(this.value)" placeholder="Enter Number...">
            <div id="hint" class="autofill-hint">✓ Customer Found</div>
        </div>
        <div class="form-group">
            <label>Account Name</label>
            <input type="text" id="accName" class="permanent-info" readonly placeholder="Auto-fills...">
        </div>
        <div class="form-group">
            <label>Old Feeder</label>
            <input type="text" id="oldFeeder" value="11kv GASHUA II" class="permanent-info" readonly>
        </div>
        <div class="form-group">
            <label>New Feeder</label>
            <input type="text" id="newFeeder" value="33kv GEIDAM" class="permanent-info" readonly>
        </div>
        <div class="form-group">
            <label>Longitude</label>
            <input type="text" id="longitude" readonly placeholder="Wait for GPS...">
        </div>
        <div class="form-group">
            <label>Latitude</label>
            <input type="text" id="latitude" readonly placeholder="Wait for GPS...">
        </div>
    </div>
    
    <div class="form-group">
        <label>Remarks</label>
        <input type="text" id="remark">
    </div>

    <button class="gps-btn" onclick="getLocation()">📍 STEP 1: CAPTURE GPS COORDINATES</button>

    <div class="btn-row">
        <button class="add-btn" onclick="addToTable()">+ STEP 2: ADD RECORD TO LIST</button>
        <button class="excel-btn" onclick="exportToExcel()">📥 STEP 3: DOWNLOAD EXCEL REPORT</button>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>S/N</th>
                <th>Acc Number</th>
                <th>Acc Name</th>
                <th>Location (Long, Lat)</th>
                <th>Remark</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

    let sessionRecords = [];

    function handleAutofill(val) {
        const hint = document.getElementById('hint');
        const nameField = document.getElementById('accName');
        const trimmed = val.trim();
        
        if (accountDatabase[trimmed]) {
            nameField.value = accountDatabase[trimmed];
            hint.style.display = "block";
            hint.innerText = "✓ Found: " + accountDatabase[trimmed];
        } else if (accountDatabase["0" + trimmed]) {
            nameField.value = accountDatabase["0" + trimmed];
            hint.style.display = "block";
        } else {
            hint.style.display = "none";
            nameField.value = "";
        }
    }

    function getLocation() {
        if (navigator.geolocation) {
            document.getElementById('longitude').value = "Locating...";
            document.getElementById('latitude').value = "Locating...";
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('longitude').value = pos.coords.longitude.toFixed(6);
                document.getElementById('latitude').value = pos.coords.latitude.toFixed(6);
            }, (err) => {
                alert("GPS Error. Please enable location on your device.");
            }, {enableHighAccuracy: true});
        }
    }

        const acc = document.getElementById('accNum').value.trim();
        const name = document.getElementById('accName').value;
        const lon = document.getElementById('longitude').value;
        const lat = document.getElementById('latitude').value;

        if(!acc || !name || !lon || lon === "Wait for GPS...") {
            return alert("Please complete lookup and GPS capture first.");
        }

        const entry = {
            "S/N": sn,
            "Account Number": acc,
            "Account Name": name,
            "Address": "Katuzu",

            "New Feeder": "33kv GEIDAM",
            "Longitude": lon,
            "Latitude": lat,
            "Remark": document.getElementById('remark').value
        };

        sessionRecords.push(entry);
        document.getElementById('recordCount').innerText = sessionRecords.length;

        // Add to UI Table
        const tbody = document.querySelector("#dataTable tbody");
        const row = `<tr>
            <td>${entry["S/N"]}</td>
            <td>${entry["Account Number"]}</td>
            <td>${entry["Account Name"]}</td>
            <td>${entry["Longitude"]}, ${entry["Latitude"]}</td>
            <td>${entry["Remark"]}</td>
        </tr>`;
        tbody.innerHTML = row + tbody.innerHTML; // Adds new records to the top

        // Reset Form
        document.getElementById('sn').value = parseInt(sn) + 1;
        ['accNum', 'accName', 'longitude', 'latitude', 'remark'].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById('hint').style.display = "none";
    }

    function exportToExcel() {
        if(sessionRecords.length === 0) return alert("No data to export.");
        const ws = XLSX.utils.json_to_sheet(sessionRecords);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "YEDC_Survey");
        XLSX.writeFile(wb, `YEDC_Bulk_Report_DS0097.xlsx`);
    }
</script>
</body>
</html>

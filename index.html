        .container { max-width: 550px; margin: auto; background: #222; padding: 25px; border-radius: 10px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h2 { text-align: center; color: var(--kali-blue); border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 0; font-size: 1.2em; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.75em; color: #999; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #00ff00; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--kali-blue); }
        .fixed-field { background: #1a1a1a !important; color: #555 !important; cursor: not-allowed; font-weight: bold; text-align: center; }
        .gps-btn { background: #5e35b1; color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .save-btn { background: #2e7d32; color: white; width: 100%; padding: 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .save-btn:active { transform: scale(0.98); }
        .status-msg { text-align: center; font-size: 0.85em; margin-top: 10px; color: #4fc3f7; display: none; }
    </style>
</head>

<div class="container">
    <h2>KATUZU INDIVIDUAL ENUM</h2>
    
    <div class="form-group">
        <label>Account Number</label>
        <input type="text" id="accNum" oninput="handleLookup(this.value)" placeholder="Enter Number...">
    </div>

    <div class="form-group">
        <label>Customer Name</label>
        <input type="text" id="accName" class="fixed-field" readonly placeholder="Auto-fills...">
    </div>

    <div class="form-group">
        <label>Address</label>
        <input type="text" value="Katuzu" class="fixed-field" readonly>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex:1;">
            <label>DT Code</label>
            <input type="text" value="DS0097" class="fixed-field" readonly>
        </div>
        <div class="form-group" style="flex:1;">
            <label>New Feeder</label>
            <input type="text" value="33kv GEIDAM" class="fixed-field" readonly>
        </div>
    </div>

    <button class="gps-btn" onclick="getLocation()">📍 CAPTURE GPS</button>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div class="form-group" style="flex:1;">
            <label>Longitude</label>
            <input type="text" id="longitude" class="fixed-field" readonly placeholder="---">
        </div>
        <div class="form-group" style="flex:1;">
            <label>Latitude</label>
            <input type="text" id="latitude" class="fixed-field" readonly placeholder="---">
        </div>
    </div>

    <div class="form-group">
        <label>Remark</label>
        <input type="text" id="remark" placeholder="Add notes here...">
    </div>

    <button class="save-btn" onclick="saveIndividual()">💾 SAVE EXCEL REPORT</button>

</div>

    function handleLookup(val) {
        const nameField = document.getElementById('accName');
        const match = accountDatabase[val.trim()];
        nameField.value = match ? match : "";
    }

    function getLocation() {
        const longField = document.getElementById('longitude');
        const latField = document.getElementById('latitude');
        longField.value = "LOCKING...";
        latField.value = "LOCKING...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                longField.value = pos.coords.longitude.toFixed(6);
                latField.value = pos.coords.latitude.toFixed(6);
            }, (err) => {
                alert("GPS Error. Check Firefox settings.");
                longField.value = ""; latField.value = "";
            }, {enableHighAccuracy: true});
        }
    }

    function saveIndividual() {
        const acc = document.getElementById('accNum').value.trim();
        const name = document.getElementById('accName').value;
        const lon = document.getElementById('longitude').value;
        const lat = document.getElementById('latitude').value;

        if(!acc || !name) return alert("Account not found!");
        if(!lon || !lat || lon === "LOCKING...") return alert("Capture GPS first!");

        const record = [{
            "Account Number": acc,
            "Customer Name": name,
            "Address": "Katuzu",
            "DT Code": "DS0097",
            "Old Feeder": "11kv GASHUA II",
            "New Feeder": "33kv GEIDAM",
            "Longitude": lon,
            "Latitude": lat,
            "Remark": document.getElementById('remark').value,
            "Time": new Date().toLocaleString()
        }];

        const ws = XLSX.utils.json_to_sheet(record);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Record");
        
        XLSX.writeFile(wb, `${acc}_Katuzu.xlsx`);

        const status = document.getElementById('status');
        status.style.display = "block";
        setTimeout(() => {
            status.style.display = "none";
            document.getElementById('accNum').value = "";
            document.getElementById('accName').value = "";
            document.getElementById('longitude').value = "";
            document.getElementById('latitude').value = "";
            document.getElementById('remark').value = "";
        }, 2000);
    }
